{% extends "layout.html" %}

{% block title %}Sign Up - Secure Identity Framework{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="margin-bottom: 25px; text-align: center; color: var(--accent-color);">Secure Registration</h2>
    <form action="{{ url_for('signup') }}" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a strong password" required>
        </div>
        <div class="form-group">
            <label for="role">Request Role</label>
            <select name="role" id="role">
                <option value="user">Standard User</option>
                <option value="admin">Administrator (Demo Only)</option>
            </select>
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">In a real system, admin roles would be strictly controlled via invitation.</p>
        </div>
        <button type="submit" style="margin-top: 20px; background: var(--accent-color); color: var(--bg-color); font-weight: bold;">Create Account</button>
    </form>
    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
</div>
{% endblock %}
